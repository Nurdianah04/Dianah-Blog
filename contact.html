<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | My Personal Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MyBlog.</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
        <button id="theme-toggle">🌙 Mode</button>
    </header>

    <main class="container">
        <section class="contact-section">
            <h2>Hubungi Saya</h2>
            <p>Mempunyai sebarang soalan? Sila isi borang di bawah:</p>
            
            <form id="contact-form" onsubmit="alert('Mesej anda telah dihantar! Terima kasih.'); return false;">
                <div class="form-group">
                    <label for="name">Nama:</label>
                    <input type="text" id="name" required placeholder="Masukkan nama anda">
                </div>
                <div class="form-group">
                    <label for="email">E-mel:</label>
                    <input type="email" id="email" required placeholder="contoh@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Mesej:</label>
                    <textarea id="message" rows="5" required placeholder="Tulis mesej anda di sini..."></textarea>
                </div>
                <button type="submit" class="btn">Hantar Mesej</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Personal Blog. Built for CSD 34203 Project.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
