<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | My Personal Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h2>Contact Me</h2>
            <p>Mempunyai sebarang idea projek atau kolaborasi? Sila isi borang di bawah:</p>
            
            <form class="contact-form" onsubmit="event.preventDefault(); alert('Mesej berjaya dihantar! (Ini simulasi JavaScript)');">
                <div class="form-group">
                    <label for="name">Nama:</label>
                    <input type="text" id="name" required placeholder="Nama anda">
                </div>
                <div class="form-group">
                    <label for="email">Emel:</label>
                    <input type="email" id="email" required placeholder="Emel anda">
                </div>
                <div class="form-group">
                    <label for="message">Mesej:</label>
                    <textarea id="message" rows="5" required placeholder="Tulis mesej anda di sini..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Hantar Mesej</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Blog Peribadi. Rekaan CSD 34203.</p>
    </footer>

</body>
</html>
