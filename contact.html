<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Personal Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <button id="theme-toggle" class="toggle-btn" aria-label="Toggle Dark Mode">🌙 Mode</button>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h2>Contact Me</h2>
            <p>Have an interesting project idea, opportunity, or collaboration in mind? Feel free to reach out using the form below:</p>
            
            <form class="contact-form" onsubmit="event.preventDefault(); alert('Message successfully sent! (JavaScript Simulation)');">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" required placeholder="Your Email">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" rows="5" required placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Blog. Built for CSD 34203.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
