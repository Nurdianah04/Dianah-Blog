<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Blog Peribadi Saya</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">MyBlog</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html" class="active">Contact</a>
            <button id="theme-toggle">🌙 Mode</button>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h2>Hubungi Saya</h2>
            <form action="#" class="contact-form">
                <label for="name">Nama:</label>
                <input type="text" id="name" required placeholder="Nama anda">

                <label for="email">E-mel:</label>
                <input type="email" id="email" required placeholder="E-mel anda">

                <label for="message">Mesej:</label>
                <textarea id="message" rows="5" required placeholder="Tulis mesej anda di sini..."></textarea>

                <button type="submit" class="btn">Hantar Mesej</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Blog Peribadi Saya. Hak Cipta Terpelihara.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
